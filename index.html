<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1419; --surface:#1A2129; --surface2:#232E3A; --line:#2B3744;
  --text:#E9EEF3; --muted:#8C9AAA; --faint:#5C6A78;
  --teal:#2DD4BF; --teal-d:#0F3B37; --amber:#F5A524; --red:#F8717A;
  --green:#34D399; --r:18px; --r-s:12px; --btn-ink:#04201d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;
  font-size:16px;line-height:1.45;padding-bottom:84px;-webkit-font-smoothing:antialiased}
.num{font-family:Sora,Inter,sans-serif;font-variant-numeric:tabular-nums}
h1,h2,h3{font-family:Sora,sans-serif;margin:0;font-weight:600;letter-spacing:-0.01em}
.app{max-width:760px;margin:0 auto;padding:18px 16px 8px}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card.tight{padding:14px}
.row{display:flex;align-items:center;gap:12px}.between{justify-content:space-between}.wrap{flex-wrap:wrap}
.grow{flex:1;min-width:0}
button{font-family:inherit;font-size:16px;cursor:pointer;border:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;padding:0 18px;
  border-radius:14px;font-weight:600;background:var(--teal);color:var(--btn-ink);width:100%}
.btn:active{transform:translateY(1px)}
.btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.btn.danger{background:transparent;color:var(--red);border:1px solid #4a2630}
.btn.sm{min-height:40px;padding:0 12px;font-size:14px;width:auto}
.btn.amber{background:var(--amber);color:#291c00}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:14px}
.ring-wrap{display:flex;align-items:center;gap:18px}.ring{flex:0 0 auto}
.streak-num{font-family:Sora;font-size:40px;font-weight:700;line-height:1}
.quote{font-size:15px;color:var(--muted);margin-top:12px;font-style:italic}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--surface2);color:var(--muted)}
.pill.knee{background:#0e3a2e;color:#5be3b4}.pill.teal{background:var(--teal-d);color:var(--teal)}
.daydot{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--surface2);color:var(--faint)}
.daydot.done{background:var(--teal);color:var(--btn-ink)}
.daydot.today{outline:2px solid var(--teal);outline-offset:2px}
.daydot.skip{background:#3a2128;color:var(--red)}
.stat{background:var(--surface2);border-radius:var(--r-s);padding:12px;flex:1}
.stat .v{font-family:Sora;font-size:22px;font-weight:600}.stat .l{font-size:12px;color:var(--muted)}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text);background:var(--bg);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 4px}
.numin{text-align:center}
.exlog{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.exhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.exname{font-family:Sora;font-weight:600;font-size:17px}
.target{font-size:13px;color:var(--muted);margin-bottom:10px}
.setrow{display:grid;grid-template-columns:34px 1fr 46px 1fr 34px;gap:8px;align-items:center;margin-bottom:8px}
.setrow .lbl{font-size:11px;color:var(--faint);text-align:center}
.tgtcell{text-align:center;font-family:Sora;font-size:14px;color:var(--muted)}
.wrow{display:flex;align-items:center;gap:10px;padding:5px 0}
.wchk{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--btn-ink);display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 auto}
.wchk.on{background:var(--teal);border-color:var(--teal)}
.wskip{background:none;color:var(--faint);font-size:12px;text-decoration:underline;padding:4px 6px;flex:0 0 auto}
.setno{font-family:Sora;color:var(--muted);text-align:center;font-size:14px}
.amraptag{display:inline-block;font-family:Inter;font-size:9px;font-weight:700;color:var(--amber);line-height:1.1}
.iconbtn{background:var(--surface2);border:1px solid var(--line);border-radius:9px;min-width:36px;height:40px;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center}
.iconbtn.val{color:var(--text);font-family:Sora;font-weight:600}
.help{background:var(--surface2);border:1px solid var(--line);color:var(--teal);border-radius:9px;width:30px;height:30px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.exnote{margin-top:8px;font-size:14px}
.scale{display:flex;flex-wrap:wrap;gap:7px}
.sbtn{width:42px;height:44px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);color:var(--text);font-family:Sora;font-weight:600;font-size:16px}
.sbtn.on{background:var(--teal);color:var(--btn-ink);border-color:var(--teal)}
.banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface2);
  border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:14px}
.themebtn{flex:1;min-height:46px;border-radius:11px;border:2px solid var(--line);background:var(--surface2);color:var(--text);font-weight:600;font-size:14px}
.themebtn.on{border-color:var(--teal)}
.nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--line);
  display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav a{flex:1;text-align:center;padding:10px 0 12px;color:var(--faint);text-decoration:none;font-size:11px;font-weight:600}
.nav a.on{color:var(--teal)}.nav .ic{display:block;font-size:20px;margin-bottom:2px;line-height:1}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:760px;max-height:88vh;overflow:auto;padding:18px 16px 30px}
@media(min-width:600px){.scrim{align-items:center}.sheet{border-radius:22px}}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--teal);color:var(--btn-ink);font-weight:600;padding:12px 18px;border-radius:12px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4)}
textarea.coach{min-height:340px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.5}
.sectitle{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 10px}
.spark{width:100%;height:54px;display:block}
a.link{color:var(--teal);text-decoration:none}
</style>
</head>

async function supabaseRequest(path, method="GET", body=null) {
  const headers = {"apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json"};
  const opts = {method, headers};
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(SUPABASE_URL + path, opts);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return method === "DELETE" ? {ok: true} : await res.json();
  } catch (e) {
    console.error("Supabase error:", e.message);
    return null;
  }
}

async function syncToCloud() {
  if (!userEmail) return;
  const payload = {email: userEmail, data: JSON.stringify(state), synced_at: new Date().toISOString()};
  const headers = {"apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates"};
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/user_state", {method: "POST", headers, body: JSON.stringify(payload)});
    if (!res.ok) console.error("Sync error: HTTP " + res.status);
  } catch(e) { console.error("Sync error:", e.message); }
}

async function syncFromCloud() {
  if (!userEmail) return;
  const res = await supabaseRequest(`/rest/v1/user_state?email=eq.${encodeURIComponent(userEmail)}&select=data&order=synced_at.desc&limit=1`);
  if (res && res.length > 0) {
    try {
      const cloudState = JSON.parse(res[0].data);
      const localW = state.workouts || [];
      const localC = state.cardio || [];
      state = cloudState;
      (localW || []).forEach(lw => {if (!state.workouts.some(w => w.id === lw.id)) state.workouts.push(lw);});
      (localC || []).forEach(lc => {if (!state.cardio.some(c => c.id === lc.id)) state.cardio.push(lc);});
      save();
      return true;
    } catch (e) {
      console.error("Parse error:", e);
    }
  }
  return false;
}

function startAutoSync() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(() => {if (userEmail) syncToCloud();}, 30000);
}

function stopAutoSync() {
  if (syncTimer) clearInterval(syncTimer);
}

function initAuth() {
  userEmail = localStorage.getItem("userEmail");
  if (userEmail) {
    startAutoSync();
    syncFromCloud().then(() => render());
  }
}

function logout() {
  userEmail = null;
  localStorage.removeItem("userEmail");
  stopAutoSync();
  toast("Logged out");
  render();
}

/* ===== helpers ===== */
function localIso(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function isoToday(){return localIso(new Date());}
function weekdayName(iso){return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{weekday:"long"});}
function shortDate(iso){return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function exById(id){return state.exercises.find(e=>e.id===id);}
function exByName(n){return state.exercises.find(e=>e.name===n);}
function e1rm(w,r){if(!w||!r)return 0;return Math.round(w*(1+r/30));}
function daysAgo(iso){return Math.round((Date.now()-new Date(iso+"T12:00:00"))/86400000);}
function fmtDur(sec){if(!sec)return"-";const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return (h?h+":":"")+(h?String(m).padStart(2,"0"):m)+":"+String(s).padStart(2,"0");}

/* ===== plan + variety engine ===== */
function defaultPlan(){
  const wuPush=["Arm circles 30s each way","Band pull-aparts x20","Scap push-ups x10","Light press x12"];
  const wuPull=["Band pull-aparts x20","Cat-cow x8","Dead hang 20s","Light row x12"];
  const wuFull=["March in place 60s","Glute bridge x15","Ankle circles x10 each","Wall sit 20s","Hip hinge x10"];
  const flex={type:"Cardio",title:"Cardio \u2014 your choice",flex:true,warmup:[],exercises:[]};
  return {
    Monday:{type:"Push",title:"Push Day",auto:true,warmup:wuPush,exercises:[]},
    Tuesday:{...flex},
    Wednesday:{type:"Pull",title:"Pull Day",auto:true,warmup:wuPull,exercises:[]},
    Thursday:{...flex},
    Friday:{type:"Full Body",title:"Full Body (Knee-Friendly)",auto:true,warmup:wuFull,exercises:[]},
    Saturday:{...flex},
    Sunday:{type:"Rest",title:"Rest",warmup:[],exercises:[]}
  };
}
const SLOTS={
  "Push":[["press",3,6,10],["incline",3,8,12],["delts",3,12,15],["tris",3,10,15]],
  "Pull":[["vpull",3,8,12],["row",3,8,12],["reardelt",3,12,15],["bis",3,10,15]],
  "Full Body":[["hinge",3,8,12],["legKnee",3,10,15],["press",3,8,12],["row",3,8,12],["core",3,30,45]]
};
const SLOT_LABEL={press:"press",incline:"incline",delts:"shoulders",tris:"triceps",vpull:"vertical pull",row:"row",reardelt:"rear delt",bis:"biceps",hinge:"hinge",legKnee:"knee-safe legs",core:"core",fly:"fly"};
function patternOf(e){const n=e.name.toLowerCase(),bp=e.bodyPart;
  if(/curl/.test(n)&&!/press/.test(n))return"bis";
  if(/face pull|rear delt|reverse fly|straight-arm/.test(n))return"reardelt";
  if(/pulldown|pull-up|pullup|chin/.test(n))return"vpull";
  if(/row/.test(n))return"row";
  if(/lateral raise|upright row|overhead press|shoulder press|arnold/.test(n))return"delts";
  if(/tricep|skull|pushdown|close-grip|kickback|dip/.test(n))return"tris";
  if(/incline/.test(n)&&/press|fly/.test(n))return"incline";
  if(/fly/.test(n))return"fly";
  if(/bench press|chest press|push-?up|squeeze press|floor press|landmine press/.test(n))return"press";
  if(/deadlift|romanian|rdl|good morning|hinge/.test(n))return"hinge";
  if(bp==="Legs"&&e.kneeFriendly)return"legKnee";
  if(bp==="Core")return"core";
  if(bp==="Shoulders")return"delts";
  if(bp==="Chest")return"press";
  if(bp==="Back")return"row";
  if(bp==="Biceps")return"bis";
  if(bp==="Triceps")return"tris";
  return null;}
function buildPools(){const p={};state.exercises.forEach(e=>{const k=patternOf(e);if(k)(p[k]=p[k]||[]).push(e);});return p;}
function recentExIds(type,n){const ws=state.workouts.filter(w=>w.type===type).sort((a,b)=>a.date<b.date?1:-1).slice(0,n);
  const s=new Set();ws.forEach(w=>w.sets.forEach(x=>s.add(x.exId)));return s;}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function generateDay(type){const slots=SLOTS[type];if(!slots)return null;
  const pools=buildPools();const avoid=recentExIds(type,2);const used=new Set();
  return slots.map(([pat,sets,lo,hi])=>{
    let pool=(pools[pat]||[]).filter(e=>!used.has(e.id));
    let cands=pool.filter(e=>!avoid.has(e.id));if(!cands.length)cands=pool;if(!cands.length)cands=(pools[pat]||[]);
    if(pat==="press"){const bb=cands.filter(e=>/barbell/i.test(e.name));if(bb.length&&Math.random()<0.6)cands=bb;}
    const e=cands.length?rand(cands):state.exercises[0];used.add(e.id);
    return {exId:e.id,repLow:lo,repHigh:hi,cue:"",note:"",rpe:null,sets:[...Array(sets)].map((_,i)=>newSet(i+1,suggestWeight(e.id,hi)||""))};
  });}

/* ===== derived ===== */
function completedDates(){return [...new Set(state.workouts.filter(w=>w.completed).map(w=>w.date).concat(state.cardio.map(c=>c.date)))];}
function weekKeyOf(iso){const d=new Date(iso+"T12:00:00");const off=(d.getDay()+6)%7;d.setDate(d.getDate()-off);return localIso(d);}
function sessionsPerWeek(){const seen={};completedDates().forEach(iso=>{const k=weekKeyOf(iso);(seen[k]=seen[k]||new Set()).add(iso);});
  const m={};Object.keys(seen).forEach(k=>m[k]=seen[k].size);return m;}
function weekStreak(target){target=target||3;const m=sessionsPerWeek();let cur=weekKeyOf(isoToday());
  if(!(m[cur]>=target)){const d=new Date(cur+"T12:00:00");d.setDate(d.getDate()-7);cur=localIso(d);}
  let s=0;for(let i=0;i<104;i++){if(m[cur]>=target){s++;const d=new Date(cur+"T12:00:00");d.setDate(d.getDate()-7);cur=localIso(d);}else break;}return s;}
function thisWeekCount(){const m=sessionsPerWeek();return m[weekKeyOf(isoToday())]||0;}
function weekStatus(){const done=new Set(completedDates());const skipped=new Set(state.skips.map(s=>s.date));
  const now=new Date();const day=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(now.getDate()-day);
  return [...Array(7)].map((_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);const iso=localIso(d);
    return {iso,label:["M","T","W","T","F","S","S"][i],done:done.has(iso),skip:skipped.has(iso)&&!done.has(iso),today:iso===isoToday()};});}
function clearSkip(date){if(state.skips&&state.skips.length)state.skips=state.skips.filter(s=>s.date!==date);}
function lastSessionFor(exId){return state.workouts.filter(w=>w.sets.some(s=>s.exId===exId)).sort((a,b)=>a.date<b.date?1:-1)[0]||null;}
function lastSessionOfType(t){return state.workouts.filter(w=>w.type===t).sort((a,b)=>a.date<b.date?1:-1)[0]||null;}
function suggestWeight(exId,repHigh){const w=lastSessionFor(exId);if(!w)return null;
  const sets=w.sets.filter(s=>s.exId===exId&&s.weight);if(!sets.length)return null;
  const best=sets.reduce((a,b)=>b.weight>a.weight?b:a);
  const noPain=(w.painDuring==null||w.painDuring<=3);
  if(best.reps>=repHigh&&noPain)return Math.round(best.weight+(best.weight<40?2.5:5));return best.weight;}
function bestE1RM(exId){let best=0,info=null;state.workouts.forEach(w=>w.sets.forEach(s=>{
  if(s.exId===exId){const e=e1rm(s.weight,s.reps);if(e>best){best=e;info={...s,date:w.date};}}}));return {e1rm:best,info};}
function volumeByMonth(exId){const m={};state.workouts.forEach(w=>{const k=w.date.slice(0,7);
  w.sets.forEach(s=>{if(!exId||s.exId===exId)m[k]=(m[k]||0)+(s.weight||0)*(s.reps||0);});});return m;}

/* ===== reminders ===== */
function reminders(){const out=[];
  if(weekdayName(isoToday())==="Friday" && !state.weights.find(w=>w.date===isoToday()))
    out.push({t:"It's Friday \u2014 log your weigh-in.",label:"Log weight",a:"nav('/settings')"});
  if(!state.lastBackup || daysAgo(state.lastBackup)>=7)
    out.push({t:"Back up your data. It lives only in this browser for now.",label:"Export",a:"exportJSON()"});
  return out;}

function ringSVG(done,total){const pct=total?Math.min(done/total,1):0,R=34,C=2*Math.PI*R,off=C*(1-pct);
  return `<svg class="ring" width="92" height="92" viewBox="0 0 92 92">
    <circle cx="46" cy="46" r="${R}" fill="none" stroke="var(--line)" stroke-width="10"/>
    <circle cx="46" cy="46" r="${R}" fill="none" stroke="var(--teal)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 46 46)"/>
    <text x="46" y="50" text-anchor="middle" font-family="Sora" font-size="18" font-weight="700" fill="var(--text)">${done}/${total}</text></svg>`;}

  const rem=reminders();
  const todayDone=state.workouts.filter(w=>w.date===isoToday()&&w.completed).sort((a,b)=>a.id<b.id?1:-1)[0];

  return `

        <div class="streak-num">${weekStreak()}<span style="font-size:16px;color:var(--muted)"> wk</span></div>
        <div class="muted" style="font-size:13px;margin-top:2px">${thisWeekCount()} of 5 this week</div>
      </div>
    </div>
    <div class="row" style="gap:6px;margin-top:14px">
      ${ws.map(d=>`<div class="daydot ${d.done?'done':''} ${d.skip?'skip':''} ${d.today?'today':''}">${d.label}</div>`).join("")}

/* ===== logger ===== */
function newSet(n,wt,amrap){return {setNum:n,reps:"",weight:wt||"",amrap:!!amrap};}
function startPlannedDay(day){
  const plan=state.plan[day];if(!plan)return;
  let exercises;
  if(plan.auto) exercises=generateDay(plan.type);
  else if(plan.exercises&&plan.exercises.length)
    exercises=plan.exercises.map(p=>({exId:p.exId,repLow:p.repLow,repHigh:p.repHigh,cue:"",note:"",rpe:null,
      sets:[...Array(p.sets)].map((_,i)=>newSet(i+1,suggestWeight(p.exId,p.repHigh)||""))}));
  if(!exercises||!exercises.length){nav("/log");return;}
  state.active={date:isoToday(),type:plan.type,title:plan.title,warmup:plan.warmup||[],warmupState:{},fromPlan:true,
    exercises,painBefore:null,painDuring:null,painAfter:null,effort:null,notes:""};
  save();nav("/log");
}
function shuffleWorkout(){const a=state.active;if(!a||!SLOTS[a.type]){toast("Nothing to shuffle here.");return;}
  const hasData=a.exercises.some(ex=>ex.sets.some(s=>s.weight!==""||s.reps!==""));
  if(hasData&&!confirm("Re-roll today's exercises? Entered sets will be cleared."))return;
  const gen=generateDay(a.type);if(gen){a.exercises=gen;save();render();toast("New mix \ud83c\udfb2");}}
function startPlanned(){const t=isoToday();if(state.planned[t]){startImported(t);return;}startPlannedDay(weekdayName(t));}
function startImported(date){const p=state.planned[date];if(!p)return;
  state.active={date:isoToday(),type:p.type,title:p.title,warmup:p.warmup||[],warmupState:{},fromPlan:true,
    exercises:p.exercises.map(x=>({exId:x.exId,repLow:x.repLow,repHigh:x.repHigh,cue:x.note||"",note:"",rpe:null,
      sets:[...Array(x.sets||3)].map((_,i)=>newSet(i+1,(x.weights&&x.weights[i]!=null)?x.weights[i]:(suggestWeight(x.exId,x.repHigh)||"")))})),
    painBefore:null,painDuring:null,painAfter:null,effort:null,notes:""};
  save();nav("/log");}
function matchExercise(name){const n=name.toLowerCase().trim();
  let e=state.exercises.find(x=>x.name.toLowerCase()===n);if(e)return e;
  e=state.exercises.find(x=>x.name.toLowerCase().includes(n)||n.includes(x.name.toLowerCase()));if(e)return e;
  const toks=n.split(/[^a-z0-9]+/).filter(w=>w.length>2);let best=null,score=0;
  state.exercises.forEach(x=>{const xt=x.name.toLowerCase();const s=toks.filter(t=>xt.includes(t)).length;if(s>score){score=s;best=x;}});
  return score>=2?best:null;}
function ensureExercise(name){const e=matchExercise(name);if(e)return e.id;
  const id=Math.max(0,...state.exercises.map(x=>x.id))+1;
  state.exercises.push({id,name:name.trim(),bodyPart:"Other",equipment:"(custom)",kneeFriendly:false});return id;}
function parseWorkout(text){
  const lines=text.split(/\n/).map(s=>s.trim()).filter(Boolean);
  let title="Custom Workout",type="Custom",start=0;
  if(lines.length&&!/\d+\s*[x\u00d7]\s*\d+/i.test(lines[0])){
    title=lines[0];const lc=title.toLowerCase();
    type=/push/.test(lc)?"Push":/pull/.test(lc)?"Pull":/full|total/.test(lc)?"Full Body":/cardio/.test(lc)?"Cardio":"Custom";
    start=1;}
  const exercises=[];
  for(let i=start;i<lines.length;i++){
    let line=lines[i].replace(/^[-*\u2022\d.\)\s]+/,'');
    const m=line.match(/^(.*?)[\s:>\-]*?(\d+)\s*[x\u00d7]\s*(\d+)(?:\s*[\-\u2013]\s*(\d+))?\s*(reps?)?$/i);
    let name,sets=3,lo=8,hi=12;
    if(m){name=m[1].trim();sets=Number(m[2]);lo=Number(m[3]);hi=m[4]?Number(m[4]):Number(m[3]);}
    else{name=line.trim();}
    if(!name)continue;
    exercises.push({exId:ensureExercise(name),sets,repLow:lo,repHigh:hi});
  }
  return {title,type,exercises};
}
function importForDate(when){
  const txt=(document.getElementById("impBox").value||"").trim();if(!txt){toast("Paste a workout first.");return;}
  const p=parseWorkout(txt);if(!p.exercises.length){toast("Couldn't read any exercises.");return;}
  const date=when==='tomorrow'?localIso(new Date(Date.now()+86400000)):isoToday();
  state.planned[date]={title:p.title,type:p.type,warmup:[],exercises:p.exercises};
  save();toast(p.exercises.length+" exercises loaded for "+when);nav("/dashboard");
}

}

function warmSkip(i){const a=state.active;a.warmupState=a.warmupState||{};a.warmupState[i]=a.warmupState[i]==='skip'?'':'skip';save();render();}
function exCard(ex,ei){

      <button class="btn sm sec" onclick="addSet(${ei},true)">+ AMRAP</button>
      <button class="btn sm ${ex.rpe?'':'ghost'}" onclick="openRpe(${ei})">RPE${ex.rpe?(' '+ex.rpe):''}</button>
      <button class="btn sm ghost" onclick="swapExercise(${ei})">Swap</button>
      <button class="btn sm ghost" onclick="rmExercise(${ei})">Remove</button></div>
    <input class="exnote" placeholder="Your note (e.g. skipped, modified, how it felt)" value="${(ex.note||'').replace(/"/g,'&quot;')}" onchange="exNote(${ei},this.value)">

}

function previewDay(dayName, iso) {
  const plan = state.plan[dayName];
  if (!plan) return;
  // Use saved planned workout if exists, else generate
  let exercises;
  if (state.planned[iso]) {
    exercises = state.planned[iso].exercises;
  } else if (plan.auto) {
    exercises = generateDay(plan.type);
  } else if (plan.exercises && plan.exercises.length) {
    exercises = plan.exercises.map(p => ({exId:p.exId,repLow:p.repLow,repHigh:p.repHigh,cue:"",note:"",rpe:null,
      sets:[...Array(p.sets)].map((_,i)=>newSet(i+1,suggestWeight(p.exId,p.repHigh)||""))}));
  }
  if (!exercises || !exercises.length) { toast("No exercises for this day."); return; }
  // Store preview in temp state
  state._preview = {dayName, iso, type: plan.type, title: plan.title, warmup: plan.warmup||[], exercises};
  save();
  nav('/preview');
}

  return `<div class="row between" style="margin-bottom:4px">
    <h1 style="margin-bottom:0">${p.title}</h1>

  <div id="preview-exlist">
  ${p.exercises.map((ex,i) => {
    const xobj = exById(ex.exId);

    return `<div class="card" style="margin-bottom:10px" id="prevex-${i}">
      <div class="row between">
        <div><b style="font-size:15px">${nm}</b><div class="muted" style="font-size:13px;margin-top:2px">${sets} sets${repRange?' &middot; '+repRange:''}</div></div>

  <button class="btn" style="margin-bottom:10px" onclick="savePreviewPlan()">&#10003; Save this plan for ${p.dayName}</button>
  <div style="height:6px"></div>
  <button class="btn ghost" onclick="previewReroll()">&#127922; Reroll exercises</button>
  <div style="height:6px"></div>
  <button class="btn ghost" onclick="nav('/plan')">Back to Weekly Plan</button>`;
}

function savePreviewPlan() {
  const p = state._preview;
  if (!p) return;
  state.planned[p.iso] = {title:p.title, type:p.type, warmup:p.warmup, exercises:p.exercises};
  save();
  toast(p.dayName + " plan saved. It will load automatically when you start.");
  nav('/plan');
}

function previewReroll() {
  const p = state._preview;
  if (!p || !SLOTS[p.type]) { toast("Can\'t reroll this type."); return; }
  p.exercises = generateDay(p.type);
  save();
  render();
  toast("New mix \uD83C\uDFB2");
}

  openExPicker(exId => {
    const p = state._preview;

    const ex = p.exercises[idx];

    const x = exById(exId); toast("Swapped to " + (x ? x.name : "exercise"));
  });

  openExPicker(exId => {

      sets:[...Array(3)].map((_,i) => newSet(i+1, suggestWeight(exId, 12)||""))});
    save(); render(); closeSheet();
    const x = exById(exId); toast("Added " + (x ? x.name : "exercise"));
  });
}

function previewRemoveEx(idx) {
  const p = state._preview;
  if (!p) return;
  if (p.exercises.length <= 1) { toast("Need at least one exercise."); return; }
  const x = exById(p.exercises[idx].exId);
  p.exercises.splice(idx, 1);
  save(); render();
  toast("Removed " + (x ? x.name : "exercise"));
}

function openExPicker(onSelect) {
  const sorted = state.exercises.slice().sort((a,b) => a.name < b.name ? -1 : 1);
  const listId = "expicker-list";
  openSheet(`
    <h2 style="margin-bottom:10px">Pick an exercise</h2>
    <input id="expicker-search" type="text" placeholder="Search 239 exercises..."
      style="width:100%;box-sizing:border-box;margin-bottom:10px;padding:10px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:15px"
      oninput="filterExPicker()" autofocus>
    <div id="${listId}" style="max-height:55vh;overflow-y:auto">
      ${sorted.map(e => `<div class="card tight" style="margin-bottom:6px;cursor:pointer" onclick="window._exPickerCb('${e.id}')">
        <b style="font-size:14px">${e.name}</b>
      </div>`).join('')}
    </div>
    <div style="height:8px"></div>
    <button class="btn ghost" onclick="closeSheet()">Cancel</button>
  `);
  window._exPickerCb = onSelect;
  // focus search
  setTimeout(() => { const el = document.getElementById('expicker-search'); if(el) el.focus(); }, 100);
}

function filterExPicker() {
  const q = (document.getElementById('expicker-search').value || '').toLowerCase();
  const list = document.getElementById('expicker-list');
  if (!list) return;
  const sorted = state.exercises.slice().sort((a,b) => a.name < b.name ? -1 : 1);
  const filtered = q ? sorted.filter(e => e.name.toLowerCase().includes(q)) : sorted;
  list.innerHTML = filtered.map(e => `<div class="card tight" style="margin-bottom:6px;cursor:pointer" onclick="window._exPickerCb('${e.id}')">
    <b style="font-size:14px">${e.name}</b>
  </div>`).join('');
}

function reviewSession(id){const w=state.workouts.find(x=>x.id===id);if(!w)return;const byEx={};
  w.sets.forEach(s=>{(byEx[s.exercise]=byEx[s.exercise]||[]).push(s);});
  openSheet(`<h2 style="margin-bottom:2px">${w.type} \u00b7 ${shortDate(w.date)}</h2>
    <p class="muted" style="font-size:13px;margin-top:2px">${w.painDuring!=null?'Pain during '+w.painDuring+' \u00b7 ':''}${w.effort!=null?'Effort '+w.effort:''}</p>
    ${Object.keys(byEx).map(ex=>`<div class="card tight"><b>${ex}</b><div class="muted" style="font-size:14px;margin-top:4px">${byEx[ex].map(s=>(s.weight||'\u2013')+'\u00d7'+(s.reps||'\u2013')+(s.amrap?' (AMRAP)':'')).join(", ")}</div></div>`).join("")}
    ${w.notes?`<p class="muted" style="font-size:14px">Notes: ${w.notes}</p>`:''}
    <button class="btn ghost" onclick="closeSheet()">Close</button>
    <div style="height:8px"></div><button class="btn danger" onclick="deleteWorkout('${id}')">Delete this workout</button>`);}
function deleteWorkout(id){if(!confirm("Delete this workout? This cannot be undone."))return;
  state.workouts=state.workouts.filter(w=>w.id!==id);save();closeSheet();toast("Deleted");render();}

/* ===== progress ===== */
function sparkline(points){if(points.length<2)return '<div class="muted" style="font-size:13px">Not enough data yet.</div>';
  const ys=points.map(p=>p.v);const minY=Math.min(...ys),maxY=Math.max(...ys),rng=(maxY-minY)||1;const W=300,H=54;
  const d=points.map((p,i)=>`${(i/(points.length-1))*W},${H-((p.v-minY)/rng)*(H-8)-4}`).join(" ");
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><polyline points="${d}" fill="none" stroke="var(--teal)" stroke-width="2.5" stroke-linejoin="round"/></svg>`;}
function viewProgress(){
  const wpts=state.weights.map(w=>({v:w.weight,d:w.date}));
  const bench=exByName("DB Bench Press (Flat)");
  const benchPts=bench?state.workouts.filter(w=>w.sets.some(s=>s.exId===bench.id)).sort((a,b)=>a.date<b.date?-1:1)
      .map(w=>({d:w.date,v:Math.max(...w.sets.filter(s=>s.exId===bench.id).map(s=>e1rm(s.weight,s.reps)))})):[];
  const vol=volumeByMonth();const volPts=Object.keys(vol).sort().map(k=>({d:k,v:Math.round(vol[k]/1000)}));
  const totalW=state.workouts.filter(w=>w.completed).length;const totalC=state.cardio.length;
  return `<h1 style="margin-bottom:4px">Progress</h1><p class="muted" style="margin-top:0">Consistency first, then strength, then weight.</p>
  <div class="row" style="gap:10px;margin-bottom:14px">
    <div class="stat"><div class="v num">${totalW}</div><div class="l">Workouts</div></div>
    <div class="stat"><div class="v num">${totalC}</div><div class="l">Cardio</div></div>
    <div class="stat"><div class="v num">${weekStreak()}</div><div class="l">Week streak</div></div></div>
  <div class="card"><div class="eyebrow">Body weight</div><h2 style="font-size:17px;margin-bottom:8px">${wpts[wpts.length-1].v} lb \u2192 goal ${state.profile.goalWeight}</h2>${sparkline(wpts)}</div>
  <div class="card"><div class="eyebrow">Est. 1RM \u00b7 DB Bench</div><h2 style="font-size:17px;margin-bottom:8px">${benchPts.length?benchPts[benchPts.length-1].v+" lb":"\u2014"}</h2>${sparkline(benchPts)}</div>
  <div class="card"><div class="eyebrow">Volume by month (x1000 lb)</div>${sparkline(volPts)}
    <div class="muted" style="font-size:12px;margin-top:6px">${volPts.map(p=>p.d.slice(5)+": "+p.v+"k").join(" \u00b7 ")}</div></div>
  <p class="muted" style="font-size:13px">Full per-exercise charts and PRs come in a later update.</p>`;}

/* ===== coach ===== */
function coachText(){const since=new Date();since.setDate(since.getDate()-21);const sinceIso=localIso(since);
  const recent=state.workouts.filter(w=>w.date>=sinceIso).sort((a,b)=>a.date<b.date?-1:1);
  const rc=state.cardio.filter(c=>c.date>=sinceIso).sort((a,b)=>a.date<b.date?-1:1);
  const skips=state.skips.filter(s=>s.date>=sinceIso);const wt=state.weights[state.weights.length-1];
  let o=[];o.push("COACH REVIEW \u2014 "+state.profile.name+" \u2014 "+isoToday());
  o.push("Goal: "+state.profile.startWeight+"\u2192"+state.profile.goalWeight+" lb by "+state.profile.goalDate+". 5 days/wk, 3 strength. Weak knees (assisted squats/lunges, protect joints).");
  o.push("Weight: "+wt.weight+" lb ("+(state.profile.startWeight-wt.weight).toFixed(1)+" lb down). To goal: "+(wt.weight-state.profile.goalWeight).toFixed(1)+" lb.");
  o.push("Week streak: "+weekStreak()+". This week: "+thisWeekCount()+"/5. Strength sessions (3wk): "+recent.length+". Cardio (3wk): "+rc.length+".");o.push("");
  o.push("RECENT STRENGTH:");recent.forEach(w=>{o.push("\u2022 "+w.date+" ("+w.type+")"+(w.painDuring!=null?" pain "+w.painDuring:"")+(w.effort!=null?" effort "+w.effort:""));
    const byEx={};w.sets.forEach(s=>{(byEx[s.exercise]=byEx[s.exercise]||[]).push(s);});
    Object.keys(byEx).forEach(ex=>{const ss=byEx[ex];const top=ss.reduce((a,b)=>(b.weight||0)>(a.weight||0)?b:a);
      o.push("    - "+ex+": "+ss.map(s=>(s.weight||"\u2013")+"x"+(s.reps||"\u2013")+(s.amrap?"(AMRAP)":"")).join(", ")+"  (e1RM "+e1rm(top.weight,top.reps)+")");});
    if(w.notes)o.push("    notes: "+w.notes);});o.push("");
  o.push("CARDIO:");rc.forEach(c=>o.push("\u2022 "+c.date+" "+c.activity+" "+(c.distanceMi?c.distanceMi+"mi ":"")+fmtDur(c.durationSec)+(c.rpe?" RPE"+c.rpe:"")+(c.hr?" HR"+c.hr:"")));o.push("");
  if(skips.length){o.push("MISSED/MOVED/REPLACED:");skips.forEach(s=>o.push("\u2022 "+s.date+" "+s.planType+" \u2192 "+s.action));o.push("");}
  o.push("BEST RECENT LIFTS (e1RM):");const lifts={};recent.forEach(w=>w.sets.forEach(s=>{const e=e1rm(s.weight,s.reps);if(e>(lifts[s.exercise]||0))lifts[s.exercise]=e;}));
  Object.keys(lifts).sort((a,b)=>lifts[b]-lifts[a]).slice(0,8).forEach(k=>o.push("\u2022 "+k+": "+lifts[k]+" lb"));o.push("");
  o.push("NUTRITION TARGETS: "+state.profile.calTarget+" kcal / "+state.profile.proteinTarget+"g protein (FoodNoms).");o.push("");
  o.push("ASK: Based on the above, give me next week's plan. Keep 1 push, 1 pull, 1 full-body (knee-safe), plus open cardio days. Tell me which lifts to progress, which to hold, and any knee-protective swaps. 30\u201345 min.");
  return o.join("\n");}
function viewCoach(){return `<h1 style="margin-bottom:4px">Coach Review</h1>
  <p class="muted" style="margin-top:0">Copy this, paste it to Claude, bring back a plan.</p>
  <button class="btn" onclick="copyCoach()">Copy summary</button><div style="height:12px"></div>
  <textarea class="coach" id="coachBox" readonly>${coachText().replace(/</g,"&lt;")}</textarea>
  <div class="sectitle"><h2 style="font-size:19px">Import a workout</h2></div>
  <p class="muted" style="margin-top:0;font-size:14px">Paste a workout, one exercise per line like "Barbell Bench Press 4x6". First line can name the day (Push, Pull, Full Body). No sets given means 3\u00d78\u201312.</p>
  <textarea id="impBox" style="min-height:150px" placeholder="Push Day\nBarbell Bench Press 4x6\nIncline DB Press 3x10\nLateral Raise 3x15\nTricep Pushdown 3x12"></textarea>
  <div class="grid2" style="margin-top:10px">
    <button class="btn sec" onclick="importForDate('today')">Load for today</button>
    <button class="btn" onclick="importForDate('tomorrow')">Load for tomorrow</button>
  </div>`;}
function copyCoach(){const t=coachText();state.lastReview=isoToday();save();
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast("Copied. Paste it to Claude.")).catch(fallbackCopy);}
  else fallbackCopy();}
function fallbackCopy(){const b=document.getElementById("coachBox");b.removeAttribute("readonly");b.focus();b.select();
  try{document.execCommand("copy");toast("Copied. Paste it to Claude.");}catch(e){toast("Select the text, then Cmd+C.");}b.setAttribute("readonly","");}

/* ===== settings + data ===== */
function viewSettings(){const p=state.profile;
  return `<h1 style="margin-bottom:4px">Settings</h1>
  <div class="card"><div class="eyebrow">Cloud sync</div>
    ${userEmail
      ? `<p class="muted" style="font-size:13px;margin:8px 0">Syncing to the cloud. Your data is safe.</p>
         <div class="row" style="gap:8px"><span style="font-size:14px;color:var(--teal)">\u2601 ${userEmail}</span>
         <button class="btn sm ghost" onclick="if(confirm('Log out of '+userEmail+'?')){logout();render();}"">Log out</button></div>`
      : `<p class="muted" style="font-size:13px;margin:8px 0">Sign in to sync across iPhone, iPad, and Mac. No password.</p>
         <button class="btn sm" onclick="openLogin()">Sign in with email</button>`}
  </div>
  <div class="card"><div class="eyebrow">Log body weight</div>
    <div class="row" style="gap:10px;margin-top:8px"><input id="todayWeight" inputmode="decimal" placeholder="${state.weights[state.weights.length-1].weight}"><button class="btn sm" onclick="logWeight()">Save</button></div>
    <p class="muted" style="font-size:12px;margin:8px 0 0">You weigh in Fridays. The app will remind you.</p></div>
  <div class="card"><div class="eyebrow">Theme</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
      <button class="themebtn ${(state.theme||'nd')==='nd'?'on':''}" onclick="setTheme('nd')">Notre Dame</button>
      <button class="themebtn ${state.theme==='night'?'on':''}" onclick="setTheme('night')">Teal Night</button>
      <button class="themebtn ${state.theme==='forge'?'on':''}" onclick="setTheme('forge')">Forge</button>
      <button class="themebtn ${state.theme==='light'?'on':''}" onclick="setTheme('light')">Light</button></div></div>
  <div class="card"><div class="eyebrow">Profile & goals</div>
    <div class="grid2" style="margin-top:8px">
      <div><label class="fld">Start weight</label><input id="sw" inputmode="decimal" value="${p.startWeight}"></div>
      <div><label class="fld">Goal weight</label><input id="gw" inputmode="decimal" value="${p.goalWeight}"></div>
      <div><label class="fld">Goal date</label><input id="gd" value="${p.goalDate}"></div>
      <div><label class="fld">Calorie target</label><input id="ct" inputmode="numeric" value="${p.calTarget}"></div>
      <div><label class="fld">Protein (g)</label><input id="pt" inputmode="numeric" value="${p.proteinTarget}"></div></div>
    <div style="height:12px"></div><button class="btn sec" onclick="saveProfile()">Save profile</button></div>
  <div class="card"><div class="eyebrow">Data \u2014 back this up often</div>
    <p class="muted" style="font-size:13px;margin:8px 0">On iPhone, browser storage can clear after ~7 days unused. Export regularly until cloud sync is added.</p>
    <button class="btn sec" onclick="exportJSON()">Export all data (JSON)</button><div style="height:8px"></div>
    <button class="btn sec" onclick="exportCSV()">Export workouts (CSV)</button><div style="height:8px"></div>
    <label class="btn ghost" style="cursor:pointer">Import data (JSON)<input type="file" accept="application/json" style="display:none" onchange="importJSON(event)"></label>
    <div style="height:8px"></div><button class="btn danger" onclick="resetAll()">Reset to seeded data</button></div>
  <div class="card"><div class="eyebrow">Merge in past sessions (JSON)</div>
    <p class="muted" style="font-size:13px;margin:8px 0">Paste a workout/cardio block to add it without touching your other data.</p>
    <textarea id="mergeBox" style="min-height:90px;font-family:ui-monospace,monospace;font-size:12px" placeholder='{"workouts":[...]}'></textarea>
    <div style="height:8px"></div><button class="btn sec" onclick="mergeImport()">Merge in</button></div>
  <div class="card"><div class="eyebrow">Logged workouts \u00b7 newest first</div>
    <p class="muted" style="font-size:12px;margin:8px 0">Tap one to review or delete it. Use this to clear a duplicate.</p>
    ${[...state.workouts.map(w=>({...w,_type:'w'})),...state.cardio.map(c=>({...c,_type:'c'}))].sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:(String(a.id)<String(b.id)?1:-1)).slice(0,25).map(item=>{
      if(item._type==='w'){const exs=[...new Set(item.sets.map(s=>s.exercise))];return `<div class="card tight" style="margin-bottom:8px;cursor:pointer" onclick="reviewSession('${item.id}')">
        <div class="row between"><b>${shortDate(item.date)} \u00b7 ${item.type}</b><span class="muted" style="font-size:12px">${item.sets.length} sets</span></div>
        <div class="muted" style="font-size:12px;margin-top:2px">${exs.slice(0,4).join(', ')}${exs.length>4?'\u2026':''}</div></div>`;}
      return `<div class="card tight" style="margin-bottom:8px">
        <div class="row between"><b>${shortDate(item.date)} \u00b7 Cardio</b><span class="muted" style="font-size:12px">${item.durationSec?Math.round(item.durationSec/60)+'m':''}</span></div>
        <div class="muted" style="font-size:12px;margin-top:2px">${item.activity||'Cardio'}</div></div>`;}).join("")}</div>
  <p class="faint" style="font-size:12px;text-align:center">Coach \u00b7 local build \u00b7 ${state.exercises.length} exercises, ${state.workouts.length} workouts</p>`;}
function mergeImport(){const text=(document.getElementById("mergeBox").value||"").trim();if(!text){toast("Paste JSON first.");return;}
  let data;try{data=JSON.parse(text);}catch(e){toast("That JSON didn't parse.");return;}
  let n=0;
  (data.workouts||[]).forEach(w=>{const sets=(w.sets||[]).map((s,i)=>({exId:ensureExercise(s.exercise),exercise:s.exercise,setNum:i+1,reps:s.reps||null,weight:s.weight||null,rpe:s.rpe||null,amrap:!!s.amrap,note:s.note||""}));
    state.workouts.push({id:"w"+Date.now()+"_"+n,date:w.date,day:weekdayName(w.date),type:w.type||"Custom",source:"import",completed:true,painBefore:w.painBefore??null,painDuring:w.painDuring??null,painAfter:w.painAfter??null,effort:w.effort??null,notes:w.notes||"",sets});clearSkip(w.date);n++;});
  (data.cardio||[]).forEach(c=>{state.cardio.push({id:"c"+Date.now()+"_"+n,date:c.date,day:weekdayName(c.date),activity:c.activity,distanceMi:c.distanceMi||null,durationSec:c.durationSec||(c.minutes?c.minutes*60:null),rpe:c.rpe||null,hr:c.hr||null,notes:c.notes||"",source:"import"});n++;});
  save();toast("Merged "+n+" entries");nav("/dashboard");}
function setTheme(n){state.theme=n;applyTheme(n);save();render();}
function logWeight(){const v=Number(document.getElementById("todayWeight").value);if(!v)return;const t=isoToday();
  const ex=state.weights.find(w=>w.date===t);if(ex)ex.weight=v;else state.weights.push({date:t,weight:v});
  state.weights.sort((a,b)=>a.date<b.date?-1:1);save();toast("Weight logged");render();}
function saveProfile(){const p=state.profile;
  p.startWeight=Number(document.getElementById("sw").value)||p.startWeight;
  p.goalWeight=Number(document.getElementById("gw").value)||p.goalWeight;
  p.goalDate=document.getElementById("gd").value||p.goalDate;
  p.calTarget=Number(document.getElementById("ct").value)||p.calTarget;
  p.proteinTarget=Number(document.getElementById("pt").value)||p.proteinTarget;save();toast("Saved");}
function download(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function exportJSON(){state.lastBackup=isoToday();save();download("coach-backup-"+isoToday()+".json",JSON.stringify(state,null,2),"application/json");toast("Backup downloaded");if((location.hash||"").includes("dashboard"))render();}
function exportCSV(){let rows=[["Date","Type","Exercise","Set","Reps","Weight","RPE","AMRAP","PainDuring","Effort","Notes"]];
  state.workouts.forEach(w=>w.sets.forEach((s,i)=>rows.push([w.date,w.type,s.exercise,i+1,s.reps||"",s.weight||"",s.rpe||"",s.amrap?"Y":"",w.painDuring==null?"":w.painDuring,w.effort==null?"":w.effort,(w.notes||"").replace(/,/g," ")])));
  download("coach-workouts-"+isoToday()+".csv",rows.map(r=>r.join(",")).join("\n"),"text/csv");}
function importJSON(ev){const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const s=JSON.parse(rd.result);if(!s.exercises||!s.workouts)throw 0;state=s;if(!state.skips)state.skips=[];
    if(!state.planned)state.planned={};applyTheme(state.theme||"night");save();toast("Data imported");nav("/dashboard");}catch(e){toast("That file did not look right.");}};rd.readAsText(f);}
function resetAll(){if(confirm("Reset to your original seeded data? This wipes new logs.")){state=freshState();applyTheme(state.theme);save();nav("/dashboard");}}

/* ===== modal + toast ===== */
function openSheet(html){closeSheet();const s=document.createElement("div");s.className="scrim";s.id="scrim";
  s.onclick=e=>{if(e.target===s)closeSheet();};s.innerHTML=`<div class="sheet">${html}</div>`;document.body.appendChild(s);}
function closeSheet(){const s=document.getElementById("scrim");if(s)s.remove();}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1800);}

render();
</script>
</body>
</html>
